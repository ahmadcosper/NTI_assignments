<html>
    <head>
        <title>Second Day Tasks</title>
        <link rel="stylesheet" href="d2_task2.css">

        <div id="div"><h1>Second Day</h1></div>
        <div id="login-form">
            <h2>Task 2: Evaluate Employee App</h2>


            <div id="form">

            <div id="left">

                <label for="name">Employee Name</label>
                <input type="text" id="name" placeholder="Enter employee name">

                <label for="age">Employee Age</label>
                <input type="number" id="age" placeholder="Enter employee age">
                <br>

                <label for="experience">Experience</label>
                <input type="number" id="experience" placeholder="Enter employee experience">
                <br>
                
                <label for="rating">Employee Rating</label>
                <input type="number" id="rating" placeholder="Enter employee rating">
                <br>
                
                <button onclick="evaluateEmployee()">Evaluate</button>
                <button onclick="workshift()">Show shift</button>
            </div>

            <div id="right">
                <h2>Employee Report</h2>
                
            </div>
            </div>
         



        </div>
